# MyInvoice.cz — Docker Compose
#
# Services:
#   app     — PHP 8.5 + Apache (built from Dockerfile)
#   db      — MariaDB 11 with persistent volume
#   redis   — optional cache/session backend (profile: redis)
#
# First run:   cmd/docker-install.{sh,ps1}     (creates cfg.php, brings stack up, runs migrations)
# Build:       cmd/docker-build.{sh,ps1}       (rebuilds the app image)
# Daily:       docker compose up -d / down
# Logs:        docker compose logs -f app

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: myinvoice:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:

      # Mutable runtime data
      - app-log:/var/www/html/log
      - app-storage:/var/www/html/storage
      - app-private:/var/www/html/private
    environment:
      TZ: Europe/Prague

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-changeme}
      MARIADB_DATABASE: ${DB_NAME:-myinvoice}
      MARIADB_USER: ${DB_USER:-myinvoice}
      MARIADB_PASSWORD: ${DB_PASSWORD:-changeme}
      TZ: Europe/Prague
    volumes:
      - db-data:/var/lib/mysql
    ports:
      # Expose only on loopback by default — comment out to keep DB internal-only
      - "127.0.0.1:${DB_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["redis"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

volumes:
  db-data:
  app-log:
  app-storage:
  app-private:
  redis-data:
