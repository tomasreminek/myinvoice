# MyInvoice.cz for Coolify "Empty" / Docker Compose resource.
#
# Paste this file into Coolify as a Docker Compose configuration.
# It pulls the official image from GHCR, asks Coolify to generate a public URL,
# and lets Coolify create stable random passwords/secrets automatically.

services:
  myinvoice:
    image: ghcr.io/radekhulan/myinvoice:latest
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    expose:
      - "80"
    environment:
      # Coolify magic variable: creates a generated domain/URL and proxies it
      # to container port 80. The generated value is reused below as app URL.
      - SERVICE_URL_MYINVOICE_80

      - TZ=Europe/Prague
      - MYINVOICE_APP_URL=$SERVICE_URL_MYINVOICE_80
      - MYINVOICE_APP_ENV=production
      - MYINVOICE_APP_DEBUG=false
      - MYINVOICE_SESSION_COOKIE_SECURE=true
      - MYINVOICE_DATA_DIR=/data

      - MYINVOICE_DB_HOST=mariadb
      - MYINVOICE_DB_PORT=3306
      - MYINVOICE_DB_NAME=myinvoice
      - MYINVOICE_DB_USER=myinvoice
      - MYINVOICE_DB_PASS=${SERVICE_PASSWORD_64_MYINVOICE_DB}

      # Random application pepper generated once by Coolify and kept stable.
      - MYINVOICE_PEPPER=${SERVICE_PASSWORD_64_MYINVOICE_PEPPER}
    volumes:
      - myinvoice-data:/data

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      - TZ=Europe/Prague
      - MARIADB_DATABASE=myinvoice
      - MARIADB_USER=myinvoice
      - MARIADB_PASSWORD=${SERVICE_PASSWORD_64_MYINVOICE_DB}
      - MARIADB_ROOT_PASSWORD=${SERVICE_PASSWORD_64_MYINVOICE_DB_ROOT}
    volumes:
      - myinvoice-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  myinvoice-data:
  myinvoice-db:
